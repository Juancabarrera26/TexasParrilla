<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Producto - Texas Parrilla</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Añadir Nuevo Producto</h1>
    </header>
    <main>
        <form id="formAgregarProducto">
            <label for="name">Nombre del Producto:</label>
            <input type="text" id="name" name="name" required>

            <label for="quantity">Cantidad:</label>
            <input type="number" id="quantity" name="quantity" required>

            <label for="unit">Unidad (kg, litros, etc.):</label>
            <input type="text" id="unit" name="unit" required>

            <button type="submit" class="btn">Agregar Producto</button>
        </form>
        <a href="menu.html" class="btn-primary">Volver al Menú</a>
    </main>

    <script>
        // Función para guardar el nuevo producto
        function guardarProducto(nombre, cantidad, unidad) {
            const producto = { nombre, cantidad, unidad };
            let productos = JSON.parse(localStorage.getItem('productos')) || [];
            productos.push(producto);
            localStorage.setItem('productos', JSON.stringify(productos));
        }

        // Evento al enviar el formulario
        document.getElementById('formAgregarProducto').addEventListener('submit', function(event) {
            event.preventDefault();
            const nombre = document.getElementById('name').value;
            const cantidad = document.getElementById('quantity').value;
            const unidad = document.getElementById('unit').value;

            guardarProducto(nombre, cantidad, unidad);

            alert('Producto agregado con éxito');
            document.getElementById('formAgregarProducto').reset(); // Limpiar el formulario
        });
    </script>
</body>
</html>
